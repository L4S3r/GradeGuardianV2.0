name: grade_guardianv2
description: >
  Trust, but verify. GradeGuardian is a Flutter app that ensures the integrity
  of student grade records using HMAC hashing. It allows students to verify
  their grades, view audit logs, and provides an admin interface for managing records.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  equatable: ^2.0.5
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true